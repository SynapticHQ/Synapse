<svg xmlns="http://www.w3.org/2000/svg" width="800" height="460" viewBox="0 0 800 460">
  <defs>
    <style>
      text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; }
      .dot-red { fill: #ff5f57; }
      .dot-yellow { fill: #febc2e; }
      .dot-green { fill: #28c840; }
    </style>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <!-- Outer glow border -->
  <rect x="1" y="1" width="798" height="458" rx="10" fill="none" stroke="#30363d" stroke-width="1.5"/>

  <!-- Main background -->
  <rect width="800" height="460" rx="10" fill="url(#bgGrad)"/>

  <!-- Header bar -->
  <rect width="800" height="44" rx="10" fill="url(#headerGrad)"/>
  <rect y="34" width="800" height="10" fill="#111827"/>

  <!-- Window dots -->
  <circle cx="22" cy="22" r="7" class="dot-red"/>
  <circle cx="44" cy="22" r="7" class="dot-yellow"/>
  <circle cx="66" cy="22" r="7" class="dot-green"/>

  <!-- Header title -->
  <text x="400" y="27" text-anchor="middle" fill="#6b7280" font-size="12" letter-spacing="2">SYNAPSE  ·  MCP ORCHESTRATOR</text>

  <!-- Agent status bar -->
  <rect x="16" y="56" width="768" height="34" rx="5" fill="#1c2128"/>
  <text x="28" y="79" fill="#3fb950" font-size="11">● 3 agents active</text>
  <text x="155" y="79" fill="#484f58" font-size="11">|</text>
  <text x="168" y="79" fill="#58a6ff" font-size="11">47 patterns</text>
  <text x="268" y="79" fill="#484f58" font-size="11">|</text>
  <text x="281" y="79" fill="#f0883e" font-size="11">12 warnings</text>
  <text x="385" y="79" fill="#484f58" font-size="11">|</text>
  <text x="398" y="79" fill="#8b949e" font-size="11">203 outcomes</text>
  <text x="620" y="79" fill="#484f58" font-size="11" text-anchor="end">cycle #47  ·  10m interval</text>
  <text x="760" y="79" fill="#3fb950" font-size="11" text-anchor="end">RUNNING</text>

  <!-- Task section -->
  <text x="28" y="118" fill="#484f58" font-size="11">INCOMING TASK</text>
  <rect x="16" y="126" width="768" height="36" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="28" y="149" fill="#e6edf3" font-size="12">"Analyze top Meteora DLMM pools, assess market conditions, and return a ranked action list."</text>

  <!-- Router -->
  <text x="28" y="186" fill="#484f58" font-size="11">ROUTER  →  AGENT DISPATCH</text>
  <rect x="16" y="194" width="768" height="28" rx="5" fill="#1c2128"/>
  <text x="28" y="213" fill="#bc8cff" font-size="12">→</text>
  <text x="46" y="213" fill="#8b949e" font-size="12">Dispatching to:</text>
  <rect x="168" y="200" width="82" height="16" rx="3" fill="#1f3a5c"/>
  <text x="209" y="213" fill="#58a6ff" font-size="11" text-anchor="middle">defi-agent</text>
  <rect x="262" y="200" width="96" height="16" rx="3" fill="#2d2638"/>
  <text x="310" y="213" fill="#bc8cff" font-size="11" text-anchor="middle">market-agent</text>
  <rect x="370" y="200" width="82" height="16" rx="3" fill="#1a3a2a"/>
  <text x="411" y="213" fill="#3fb950" font-size="11" text-anchor="middle">executor</text>

  <!-- Agent rows -->
  <!-- defi-agent -->
  <rect x="16" y="236" width="768" height="54" rx="5" fill="#161b22" stroke="#1f3a5c" stroke-width="1"/>
  <rect x="16" y="236" width="4" height="54" rx="2" fill="#58a6ff"/>
  <text x="32" y="256" fill="#58a6ff" font-size="12" font-weight="bold">defi-agent</text>
  <rect x="118" y="244" width="52" height="14" rx="3" fill="#1f3a5c"/>
  <text x="144" y="255" fill="#58a6ff" font-size="10" text-anchor="middle">ACTIVE</text>
  <text x="32" y="278" fill="#6b7280" font-size="11">Tools: meteora_get_pool_state · meteora_get_bin_array · volume_authenticity_check · jupiter_get_price</text>
  <text x="748" y="256" fill="#3fb950" font-size="11" text-anchor="end">✓ 6 pools fetched  142ms</text>

  <!-- market-agent -->
  <rect x="16" y="300" width="768" height="54" rx="5" fill="#161b22" stroke="#2d2638" stroke-width="1"/>
  <rect x="16" y="300" width="4" height="54" rx="2" fill="#bc8cff"/>
  <text x="32" y="320" fill="#bc8cff" font-size="12" font-weight="bold">market-agent</text>
  <rect x="134" y="308" width="52" height="14" rx="3" fill="#2d2638"/>
  <text x="160" y="319" fill="#bc8cff" font-size="10" text-anchor="middle">ACTIVE</text>
  <text x="32" y="342" fill="#6b7280" font-size="11">Tools: get_funding_rates · get_ohlcv · get_orderbook_depth · trend_classifier</text>
  <text x="748" y="320" fill="#3fb950" font-size="11" text-anchor="end">✓ Trend: BULLISH  891ms</text>

  <!-- executor -->
  <rect x="16" y="364" width="768" height="54" rx="5" fill="#161b22" stroke="#1a3a2a" stroke-width="1"/>
  <rect x="16" y="364" width="4" height="54" rx="2" fill="#3fb950"/>
  <text x="32" y="384" fill="#3fb950" font-size="12" font-weight="bold">executor</text>
  <rect x="100" y="372" width="68" height="14" rx="3" fill="#1a3a2a"/>
  <text x="134" y="383" fill="#3fb950" font-size="10" text-anchor="middle">REASONING</text>
  <text x="32" y="406" fill="#6b7280" font-size="11">Aggregating defi-agent + market-agent context · evaluating 3 candidate actions · confidence gate pending</text>

  <!-- Blinking cursor on executor -->
  <rect x="748" y="374" width="8" height="14" rx="1" fill="#3fb950" opacity="0.8"/>

  <!-- Footer -->
  <rect x="0" y="430" width="800" height="30" rx="0" fill="#111827"/>
  <rect x="0" y="430" width="800" height="1" fill="#30363d"/>
  <rect x="0" y="450" width="800" height="10" rx="10" fill="#111827"/>
  <text x="28" y="450" fill="#484f58" font-size="10">Claude Sonnet 4.5  ·  Bun 1.2  ·  Solana</text>
  <text x="772" y="450" fill="#484f58" font-size="10" text-anchor="end">DeltaLogicLabs/synapse</text>
</svg>
